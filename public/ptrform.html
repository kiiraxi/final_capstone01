<script>
function goToPage2() {
  const requiredFields = document.querySelectorAll('#page1 [required]');
  let allValid = true;

  requiredFields.forEach(field => {
    if (!field.value.trim()) {
      field.classList.add('is-invalid');
      allValid = false;
    } else {
      field.classList.remove('is-invalid');
    }
  });

  if (allValid) {
    document.getElementById('page1').classList.add('d-none');
    document.getElementById('page2').classList.remove('d-none');
  } else {
    alert('Please fill out all required fields on Page 1.');
  }
}
</script>

 <script>
        document.addEventListener("DOMContentLoaded", function () {
            let now = new Date();
            let year = now.getFullYear();
            let month = String(now.getMonth() + 1).padStart(2, '0');
            let day = String(now.getDate()).padStart(2, '0');
            let formattedDate = `${year}-${month}-${day}`;

            document.getElementById("date_issue").value = formattedDate;
        });
