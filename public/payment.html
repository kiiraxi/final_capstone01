<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Online Payment</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body class="p-4">
  <div class="container mt-4">
    <h3>Online Payment</h3>
    <p>Reference Number: <span id="ref"></span></p>
    <p>Name: <span id="name"></span></p>
    <p>Amount Due: ₱<span id="amount"></span></p>

    <div class="mt-3">
      <button id="payOnline" class="btn btn-primary">Pay Online (Mock)</button>
      <a href="/userhomepage.html" class="btn btn-secondary">Pay Over the Counter</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get('ref');
    document.getElementById('ref').textContent = ref;

    // Fetch form info
    fetch(`/payment-info?ref=${ref}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('name').textContent = data.name;
        document.getElementById('amount').textContent = data.amount;
      });

    document.getElementById('payOnline').addEventListener('click', () => {
      fetch(`/confirm-payment?ref=${ref}`, { method: "POST" })
        .then(() => {
          alert("Payment successful!");
          window.location.href = "/receipt.html?ref=" + ref;
        });
    });
  </script>
</body>
</html>
