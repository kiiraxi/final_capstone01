<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>COMMUNITY TAX CERTIFICATE</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f5f3;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: gray;
            color: white;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px 20px;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .header-title {
            font-size: 22px;
            font-weight: bold;
            margin-left: 10px;
        }
        .container-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #060505;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #474141;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .verify-btn {
            background: #686fa7;
            color: white;
        }
        .verify-btn:hover {
            background: #4d58a8;
        }
        .back-btn {
            background: #6c757d;
            color: white;
            margin-top: 10px;
        }
        .back-btn:hover {
            background: #5a6268;
        }
        .timer {
            margin-top: 10px;
            font-size: 14px;
            color: red;
            font-weight: bold;
        }
        .expired {
            color: red;
            font-size: 16px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <img src="assets/img/leonlogo.png" alt="Logo" style="height: 80px;"> 
        <span class="header-title">COMMUNITY TAX CERTIFICATE</span>
    </div>

    <!-- Centered OTP Verification Form -->
    <div class="container-wrapper">
        <div class="form-container">
            <h2>Verify Your Identity</h2>
            <div class="form-group">
                <label for="code">Enter the One-Time Password (OTP) sent to your email.</label>
                <input type="text" id="code" name="code" maxlength="6" required>
            </div>
            <div class="timer">OTP Expires in <span id="countdown">05:00</span></div>
            <div class="form-group">
                <button id="verifyBtn" class="verify-btn">Verify</button>
                <button id="backBtn" class="back-btn">Back</button>
            </div>
            <p id="expiredMessage" class="expired">OTP Expired! Request a new one.</p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const verifyButton = document.getElementById("verifyBtn");
            const backButton = document.getElementById("backBtn");
            const countdownElement = document.getElementById("countdown");
            const expiredMessage = document.getElementById("expiredMessage");
            let timeLeft = 300; 

            // Countdown Timer
            const timerInterval = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                countdownElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    verifyButton.disabled = true;
                    verifyButton.style.background = "#ccc";
                    expiredMessage.style.display = "block";
                }
                timeLeft--;
            }, 1000);

            // OTP Verification
            verifyButton.addEventListener("click", function(event) {
                event.preventDefault();

                const otp = document.getElementById("code").value;

                fetch("http://localhost:5000/auth", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ otp })
                })
                .then(response => response.text())
                .then(data => {
                    if (data.includes("OTP verified")) {
                        alert("OTP Verified! Redirecting...");
                        window.location.href = "userhomepage.html"; 
                    } else {
                        alert("Invalid OTP. Please try again.");
                    }
                })
                .catch(error => console.error("Error:", error));
            });

            backButton.addEventListener("click", function() {
                window.history.back(); 
            });
        });
    </script>

   




    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
