<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
    <title>Login - Treasury Office</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link href="css/styles.css" rel="stylesheet" />
    <style>
        .home-btn {
          padding: 10px 20px;
          font-size: 16px;
          background-color: #294461;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          position: absolute;
          top: 25px;
          right: 10px;
        }
      
        .home-btn:hover {
          background-color: #348dec;
        }
      </style>
      
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid d-flex align-items-center">
            <div class="d-flex align-items-center">
                <img src="assets/img/leonlogo.png" alt="Treasury Office Logo" style="max-width: 80px; margin-right: 20px;">
                <a class="navbar-brand mb-0 h1" href="adminlogin.html">Treasury Admin </a>
              <button class="home-btn" onclick="window.location.href='index.html'"><i class="fas fa-home"></i></button>


            </div>
           
        </div>
    </nav>
    
    <!-- Login Section -->
    <section class="vh-100 d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow p-4">
                        <h2 class="text-center mb-4">Administrator</h2>
                        <form action="/adminlogin" method="POST">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" id="username" name="username" class="form-control" 
                                    placeholder="Enter your username" required autocomplete="username" 
                                    aria-label="Username">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" name="password" class="form-control" 
                                    placeholder="Enter your password" required autocomplete="current-password" 
                                    aria-label="Password">
                            </div>
                            <button type="submit" class="btn btn-info w-100">Login</button>
                            
                        </form>
                    
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
