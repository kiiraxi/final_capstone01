<!-- tax penalty -->
   <script>
document.addEventListener("DOMContentLoaded", function () {

    const paymentDateInput = document.getElementById("date_issue");
    const now = new Date();
    if (paymentDateInput && !paymentDateInput.value) {
        const formattedDate = now.toISOString().split('T')[0];
        paymentDateInput.value = formattedDate;
    }

    const basicTaxInput = document.querySelector("[name='basic_tax']");
    const grossReceipt = document.querySelector("[name='gross_receipt']");
    const annualIncome = document.querySelector("[name='annual_income']");
    const realPropertyIncome = document.querySelector("[name='real_property_income']");
    const totalTaxableField = document.querySelector("#total_taxable");
    const interestField = document.querySelector("#interest");
    const ctcAmountField = document.querySelector("#ctc_amount");

    function computeCTC() {
        const basicTax = parseFloat(basicTaxInput.value) || 0;
        const gross = parseFloat(grossReceipt.value) || 0;
        const income = parseFloat(annualIncome.value) || 0;
        const property = parseFloat(realPropertyIncome.value) || 0;

        // Compute total tax
        const additionalTax = (gross / 1000) + (income / 1000) + (property / 1000);
        const totalTaxable = basicTax + additionalTax;

        // Compute penalty based on date
        const payDate = new Date(paymentDateInput.value);
        const year = payDate.getFullYear();
        const dueDate = new Date(`${year}-02-28`);

        let penaltyRate = 0;

        if (payDate > dueDate) {
            const month = payDate.getMonth() + 1; 
            if (month === 3) {
                penaltyRate = 0.06; 
            } else if (month > 3) {
              
                penaltyRate = 0.06 + (0.02 * (month - 3));
            }
        }

        const interest = totalTaxable * penaltyRate;
        const totalPayable = totalTaxable + interest;

        totalTaxableField.value = totalTaxable.toFixed(2);
        interestField.value = interest.toFixed(2);
        ctcAmountField.value = totalPayable.toFixed(2);
    }

    [grossReceipt, annualIncome, realPropertyIncome, paymentDateInput].forEach(el => {
        el.addEventListener("input", computeCTC);
        el.addEventListener("change", computeCTC);
    });

    computeCTC();
});
</script>

<!-- signature pad -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
<script>
  const canvas = document.getElementById('signature-pad');
  const signaturePad = new SignaturePad(canvas);
  const clearButton = document.getElementById('clear-signature');
  const signatureInput = document.getElementById('signature_data');
  const form = document.querySelector('form');
  
  function resizeCanvas() {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    const ctx = canvas.getContext("2d");
    ctx.scale(ratio, ratio);
    signaturePad.clear();
  }

  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  
  clearButton.addEventListener("click", (e) => {
    e.preventDefault();
    signaturePad.clear();
    signatureInput.value = "";
  });

  
  signaturePad.onEnd = () => {
    signatureInput.value = signaturePad.toDataURL("image/png");
  };

  
  form.addEventListener("submit", (event) => {
    if (signaturePad.isEmpty()) {
      event.preventDefault();
      alert("Please provide your signature before submitting.");
      return;
    }
   
    signatureInput.value = signaturePad.toDataURL("image/png");
  });
</script>

<!-- age restriction -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const birthInput = document.getElementById("birth_date");
    const form = document.querySelector("form");
    const ageModal = new bootstrap.Modal(document.getElementById("ageModal"));

    const today = new Date();
    const minAgeDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
    birthInput.max = minAgeDate.toISOString().split("T")[0];

    form.addEventListener("submit", function (event) {
        const birthDate = new Date(birthInput.value);
        if (isNaN(birthDate.getTime())) {
            event.preventDefault();
            ageModal.show();
            document.querySelector("#ageModal .modal-body").innerHTML = "Please enter a valid date of birth.";
            return;
        }

        const age =
            today.getFullYear() - birthDate.getFullYear() -
            (today < new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate()) ? 1 : 0);

        if (age < 18) {
            event.preventDefault();
            document.querySelector("#ageModal .modal-body").innerHTML =
                "You must be at least <strong>18 years old</strong> to fill out this form.";
            ageModal.show();
            birthInput.focus();
        }
    });
});
</script>
