<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>COMMUNITY TAX CERTIFICATE</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="css/styles.css" rel="stylesheet" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #3b7c9a;
            color: white;
            display: flex;
            align-items: center;
            padding: 10px 20px;
        }
        .header-title {
            font-size: 22px;
            font-weight: bold;
        }
        .sub-header {
            background-color:#a9abbe65;
            padding: 10px 20px;
            font-size: 14px;
        }
        .sub-header p {
            color: #5c09ec88;
            margin: 0;
            font-weight: bold;
        }
        .required {
            color: red;
            font-weight: bold;
        }
        .is-invalid {
    border-color: red;
}

    </style>
</head>
<body>
    <div class="header d-flex align-items-center justify-content-between p-3">
        <div class="d-flex align-items-center">
            <img src="assets/img/leonlogo.png" alt="Logo" class="me-2" style="height: 50px;"> 
            <span class="header-title">COMMUNITY TAX CERTIFICATE</span>
        </div>
    </div>
    <form id="form" action="/corporation" method="POST">
        <div class="sub-header d-flex justify-content-between p-2">
                <div>
                    <label class="fw-bold">Place of Issue:</label>
                    <input type="text" class="form-control d-inline-block w-auto" name="place_issue" value="LEON" readonly>
                </div>
                <div>
                    <label class="fw-bold">Date Issued:</label>
                    <input type="text" class="form-control d-inline-block w-auto" id="date_issue" name="date_issue" readonly>
                </div>
            </div>
        </div>
        <div class="container mt-5 pt-5">
            <div class="card shadow-lg p-4">
                <h3 class="section-header text-center">Basic Information</h3>
                <div class="form-group mt-3">
                    <label>COMPANY'S FULL NAME:<span class="required">*</span></label>
                    <input type="text" class="form-control" name="company_name" placeholder="Company's Full Name" required>
                </div>
               <div class="form-group mt-3">
                   <label>ADDRESS OR PRINCIPAL PLACE OF BUSINESS:<span class="required">*</span></label>
                   <input type="text" class="form-control" id="address" name="address" value="Leon, Iloilo" placeholder="Address Place Of Business" autocomplete="off" required>
               </div>

               
                <div class="form-group mt-3">
                    <label>PLACE OF INCORPORATION:<span class="required">*</span></label>
                    <input type="text" class="form-control" id="place_incorp" name="place_incorp" placeholder="Place Of Incorporation" autocomplete="off" required>
                </div>
                <div class="form-group mt-3">
                    <label>DATE OF REGISTRATION / INCORPORATION:<span class="required">*</span></label>
                    <input type="date" class="form-control" id="date_registration" name="date_registration" placeholder="Date Of Regisratiom" autocomplete="off" required>
                </div>
                 <div class="form-group mt-3">
                    <label>KIND OF ORGANIZATION:<span class="required">*</span></label>
                    <select class="form-control" name="oganization">
                        <option value="">Select</option>
                        <option value="Corporation">Corporation</option>
                        <option value="Partnership">Partnership</option>
                        <option value="Association">Association</option>
                        
                    </select>
                    </div>
               <div class="form-group mt-3 d-flex justify-content-between">
                    
                    <label class="float-right">TIN Number (if any)</label>
                </div>
                <div class="row">
                   
                    <div class="col-sm-6">
                        <input type="text" class="form-control" id="tin" name="tin" placeholder="TIN Number" autocomplete="off">
                    </div>
                </div>

                <h3 class="section-header mt-5 text-center">Tax Computation</h3>
                <div style="background-color: #3b7c9a;" class="text-white p-2 mt-4">A. Basic Community Tax (₱500.00):</div>

                <div class="form-group mt-3">
                    <input type="text" class="form-control" name="basic_tax" value="500.00" readonly>
                </div>
                <div style="background-color: #3b7c9a;" class="text-white p-2 mt-4">B. Additional Community Tax:</div>
                
                <div class="form-group mt-3">
                    <label>ASSESSED VALUE OF REAL PROPERTY owned in the Philippines:</label>
                    <input type="number" class="form-control" name="real_property" placeholder="Php">
                </div>
                <div class="form-group mt-3">
                    <label>GROSS RECEIPTS, INCLUDING DIVIDENDS, EARNINGS DERIVED FROM BUSINESS in the Phil. during the preceding year:</label>
                    <input type="number" class="form-control" name="gross_receipt" placeholder="Php">
                </div>
            
                <div class="form-group mt-3">
                    <label>Total Taxable Amount</label>
                    <div class="input-group">
                        <span class="input-group-text">₱</span>
                        <input type="text" class="form-control" id="total_taxable" name="total_taxable" readonly>
                    </div>
                </div>
                 <div class="form-group mt-3">
                    <label>Interest</label>
                    <input type="number" class="form-control" id="interest" name="interest" placeholder="Php" readonly>
                </div>
                <div class="form-group mt-3">
                    <label>Amount of CTC to be Paid</label>
                    <div class="input-group">
                        <span class="input-group-text">₱</span>
                        <input type="text" class="form-control" id="ctc_amount" name="ctc_amount" readonly>
                    </div>
                </div>
                <div class="alert alert-warning mt-3">Tax due computed above is only a preliminary assessment. The amount due may change upon validation.</div>
                <div class="text-center mt-4">
                    <button onclick="window.location.href='userhomepage.html'" style="background-color: #3b7c9a; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
                        Back
                    </button>
                    
                    <button type="submit" style="background-color: #3b7c9a; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
                        Submit
                    </button>
                    
                </div>
            </div>
        </div>
    </form>
    
   
    
  <script>
document.addEventListener("DOMContentLoaded", function () {
    const paymentDateInput = document.getElementById("date_issue");

    
    const now = new Date();
    if (paymentDateInput && !paymentDateInput.value) {
        const formattedDate = now.toISOString().split("T")[0];
        paymentDateInput.value = formattedDate;
    }

    const realPropertyInput = document.querySelector("[name='real_property']");
    const grossReceiptInput = document.querySelector("[name='gross_receipt']");
    const totalTaxableField = document.querySelector("#total_taxable");
    const interestField = document.querySelector("#interest");
    const ctcAmountField = document.querySelector("#ctc_amount");

    function computeCTC() {
        const realProperty = parseFloat(realPropertyInput.value) || 0;
        const grossReceipt = parseFloat(grossReceiptInput.value) || 0;

      
        const totalAssets = realProperty + grossReceipt;

        const basicTax = 500;
        const additionalTax = Math.floor(totalAssets / 5000) * 2;
        const totalTaxable = basicTax + additionalTax;

        const payDate = new Date(paymentDateInput.value);
        const year = payDate.getFullYear();
        const dueDate = new Date(`${year}-02-28`);

        let penaltyRate = 0;

        if (payDate > dueDate) {
            const month = payDate.getMonth() + 1; // March = 3, April = 4, etc.
            if (month === 3) {
                penaltyRate = 0.06; // March = 6%
            } else if (month > 3) {
                // April = 8%, May = 10%, June = 12%, etc.
                penaltyRate = 0.06 + 0.02 * (month - 3);
            }
        }

        const interest = totalTaxable * penaltyRate;
        const totalPayable = totalTaxable + interest;

     
        totalTaxableField.value = totalTaxable.toFixed(2);
        interestField.value = interest.toFixed(2);
        ctcAmountField.value = totalPayable.toFixed(2);
    }

    [realPropertyInput, grossReceiptInput, paymentDateInput].forEach(el => {
        el.addEventListener("input", computeCTC);
        el.addEventListener("change", computeCTC);
    });

    computeCTC();
});
</script>



<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('form');
    const requiredFields = form.querySelectorAll('[required]');

   
    form.addEventListener('submit', function(event) {
        let allValid = true;

        requiredFields.forEach(field => {
            if (!field.value.trim() && field.style.borderColor !== 'black') {
                field.classList.add('is-invalid');
                allValid = false;
            } else {
                field.classList.remove('is-invalid');
            }
        });

        if (!allValid) {
            event.preventDefault();
            alert('Please fill out all required fields.');
        }
    });
});
</script>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
